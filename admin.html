<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: radial-gradient(circle,#0f172a,#020617);
    color:white;
}

h2{
    text-align:center;
    padding:20px;
}

/* CARD */
.card{
    width:420px;
    margin:15px auto;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    padding:18px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

/* BUTTONS */
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* ACTION BUTTONS */
.done{
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
}

.del{
    background:linear-gradient(90deg,#ef4444,#b91c1c);
    color:white;
}

.clear{
    background:linear-gradient(90deg,#f59e0b,#d97706);
    color:white;
}

img{
    width:100%;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>📊 Admin Dashboard</h2>

<div id="list"></div>

<script>

function load(){
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    let box = document.getElementById("list");
    box.innerHTML = "";

    orders.forEach((o,i)=>{
        box.innerHTML += `
        <div class="card">
            <b>👤 ${o.name}</b><br>
            📦 ${o.order}<br>
            <small>Status: <b style="color:#38bdf8">${o.status}</b></small><br>

            ${o.image ? `<img src="${o.image}">` : ""}

            <button class="done" onclick="done(${i})">✔ Mark Done</button>
            <button class="del" onclick="deleteOrder(${i})">🗑 Delete Order</button>
            <button class="clear" onclick="clearChat(${i})">💬 Clear Conversation</button>
        </div>
        `;
    });
}

/* DONE */
function done(i){
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    orders[i].status = "Done";
    localStorage.setItem("orders", JSON.stringify(orders));
    load();
}

/* DELETE */
function deleteOrder(i){
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    orders.splice(i,1);
    localStorage.setItem("orders", JSON.stringify(orders));
    load();
}

/* CLEAR CHAT */
function clearChat(i){
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    orders[i].messages = [];
    localStorage.setItem("orders", JSON.stringify(orders));
    load();
}

setInterval(load,1000);
load();

</script>

</body>
</html>
