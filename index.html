<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order System</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top,#1e3a8a,#0f172a);
    color:white;
}

/* HEADER CARD */
.container{
    width:380px;
    margin:30px auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    transition:0.3s;
}

.container:hover{
    transform:translateY(-3px);
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
}

input::placeholder{
    color:#cbd5e1;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,198,255,0.3);
}

button:hover{
    transform:scale(1.03);
}

/* LIST AREA */
#list{
    width:420px;
    margin:20px auto;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    padding:18px;
    margin:12px 0;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

/* IMAGE */
img{
    width:100%;
    border-radius:12px;
    margin-top:10px;
}

/* DELETE BUTTON */
.del{
    background:linear-gradient(90deg,#ef4444,#b91c1c);
}

/* CLEAR CHAT */
.clear{
    background:linear-gradient(90deg,#f59e0b,#d97706);
}

/* TITLE */
h2{
    text-align:center;
    font-size:22px;
}
</style>
</head>

<body>

<div class="container">
<h2>📦 Place Your Order</h2>

<input id="name" placeholder="Your Name">
<input id="order" placeholder="Order Details">
<input type="file" id="image">

<button onclick="submitOrder()">🚀 Send Order</button>
</div>

<div id="list"></div>

<script>
function submitOrder(){
    let name = document.getElementById("name").value;
    let order = document.getElementById("order").value;
    let file = document.getElementById("image").files[0];

    if(!name || !order){
        alert("Fill all fields");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(){

        let data = {
            name,
            order,
            image: reader.result || "",
            status:"Processing",
            messages:[]
        };

        let orders = JSON.parse(localStorage.getItem("orders") || "[]");
        orders.push(data);
        localStorage.setItem("orders", JSON.stringify(orders));

        load();
    }

    if(file) reader.readAsDataURL(file);
    else reader.onload();
}

/* DELETE ORDER */
function deleteOrder(i){
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    orders.splice(i,1);
    localStorage.setItem("orders", JSON.stringify(orders));
    load();
}

/* CLEAR CHAT */
function clearChat(i){
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    orders[i].messages = [];
    localStorage.setItem("orders", JSON.stringify(orders));
    load();
}

function load(){
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    let box = document.getElementById("list");
    box.innerHTML = "";

    orders.forEach((o,i)=>{
        box.innerHTML += `
        <div class="card">
            <b>👤 ${o.name}</b><br>
            📦 ${o.order}<br>
            <small>Status: <b style="color:#38bdf8">${o.status}</b></small><br>

            ${o.image ? `<img src="${o.image}">` : ""}

            <button class="del" onclick="deleteOrder(${i})">🗑 Delete Order</button>
            <button class="clear" onclick="clearChat(${i})">💬 Clear Chat</button>
        </div>
        `;
    });
}

load();
</script>

</body>
</html>
